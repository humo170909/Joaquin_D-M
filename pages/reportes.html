<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — JOAQUIN D&M</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="app"></div>
<div class="session-bar"><div class="session-bar-fill" id="sessionBar"></div></div>
<div id="notificationContainer" class="notification-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById('app').innerHTML = `
  ${renderSidebar()}
  ${renderTopbar('Reportes & Backups', 'Generación de reportes y respaldos automáticos')}
  <main class="main-content" id="mainContent">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Reportes</h1>
        <div class="breadcrumb">
          <span>Inicio</span><span class="sep">›</span><span>Reportes</span>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="report-filters" id="reportFilters">
      <div class="report-filter-group">
        <label>Tipo de Período</label>
        <select class="filter-select" id="tipoPeriodo" style="min-width:140px">
          <option value="dia">Día</option>
          <option value="semana">Semana</option>
          <option value="mes" selected>Mes</option>
          <option value="año">Año</option>
          <option value="personalizado">Personalizado</option>
        </select>
      </div>
      <div class="report-filter-group" id="selectDia" style="display:none">
        <label>Fecha</label>
        <input type="date" class="filter-select" id="filtroDia">
      </div>
      <div class="report-filter-group" id="selectSemana" style="display:none">
        <label>Semana</label>
        <input type="week" class="filter-select" id="filtroSemana">
      </div>
      <div class="report-filter-group" id="selectMes">
        <label>Mes</label>
        <input type="month" class="filter-select" id="filtroMes">
      </div>
      <div class="report-filter-group" id="selectAnio" style="display:none">
        <label>Año</label>
        <input type="number" class="filter-select" id="filtroAnio" min="2020" max="2099" style="width:100px">
      </div>
      <div id="selectPersonalizado" style="display:none;gap:12px">
        <div class="report-filter-group">
          <label>Desde</label>
          <input type="date" class="filter-select" id="filtroDesde">
        </div>
        <div class="report-filter-group">
          <label>Hasta</label>
          <input type="date" class="filter-select" id="filtroHasta">
        </div>
      </div>
      <div class="report-filter-group">
        <label>Colaborador</label>
        <select class="filter-select" id="filtroColaborador" style="min-width:180px">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="export-actions">
        <button class="btn btn-primary" onclick="generarReporte()"><span>🔄</span> Generar</button>
        <button class="btn btn-success" onclick="exportarExcel()"><span>📊</span> Excel</button>
        <button class="btn btn-danger" onclick="exportarPDF()"><span>📄</span> PDF</button>
      </div>
    </div>

    <!-- KPIs del reporte -->
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:24px" id="reporteKpis" style="display:none"></div>

    <!-- Tabs de reporte -->
    <div style="display:flex;gap:8px;margin-bottom:16px" id="reporteTabs">
      <button class="btn btn-primary" id="tabViajes" onclick="switchReporteTab('viajes')">🚛 Viajes</button>
      <button class="btn btn-secondary" id="tabPagos" onclick="switchReporteTab('pagos')">💰 Pagos</button>
      <button class="btn btn-secondary" id="tabAuditoria" onclick="switchReporteTab('auditoria')">📋 Auditoría</button>
      <button class="btn btn-secondary" id="tabBackups" onclick="switchReporteTab('backups')">💾 Backups</button>
    </div>

    <!-- Contenido del reporte -->
    <div class="card" id="reporteContent">
      <div class="card-body">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <div class="empty-title">Selecciona un período y genera el reporte</div>
          <div class="empty-desc">Elige las fechas y haz clic en "Generar" para ver los datos</div>
        </div>
      </div>
    </div>

    <!-- Historial de Backups -->
    <div class="card" style="margin-top:24px" id="backupsSection" style="display:none">
      <div class="card-header">
        <div class="card-title"><div class="title-icon">💾</div> Historial de Backups</div>
        <button class="btn btn-primary btn-sm" onclick="generarBackupMensual()">
          <span>💾</span> Generar Backup Mensual
        </button>
      </div>
      <div class="card-body p-0" id="backupsList">
        <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
      </div>
    </div>
  </main>
`;
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="../js/reportes.js"></script>
</body>
</html>
