<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaboradores — JOAQUIN D&M</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="app"></div>
<div class="session-bar"><div class="session-bar-fill" id="sessionBar"></div></div>
<div id="notificationContainer" class="notification-container"></div>

<!-- Modal: Agregar / Editar Colaborador -->
<div class="modal-overlay" id="modalColaborador">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon blue">👥</div>
        <span id="modalColaboradorTitle">Nuevo Colaborador</span>
      </div>
      <button class="btn-modal-close" onclick="closeModalColaborador()">✕</button>
    </div>
    <div class="modal-body">
      <form id="formColaborador" novalidate>
        <input type="hidden" id="colabId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">DNI <span class="required">*</span></label>
            <input type="text" class="form-input" id="colabDni" maxlength="20" placeholder="12345678">
          </div>
          <div class="form-group">
            <label class="form-label">Cargo <span class="required">*</span></label>
            <select class="form-input" id="colabCargo">
              <option value="">Seleccionar...</option>
              <option value="Agente de Seguridad">Agente de Seguridad</option>
              <option value="Supervisor de Campo">Supervisor de Campo</option>
              <option value="Jefe de Unidad">Jefe de Unidad</option>
              <option value="Resguardo Armado">Resguardo Armado</option>
              <option value="Motorizado">Motorizado</option>
              <option value="Conductor">Conductor</option>
              <option value="Coordinador">Coordinador</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nombres <span class="required">*</span></label>
            <input type="text" class="form-input" id="colabNombres" maxlength="100" placeholder="Juan Carlos">
          </div>
          <div class="form-group">
            <label class="form-label">Apellidos <span class="required">*</span></label>
            <input type="text" class="form-input" id="colabApellidos" maxlength="100" placeholder="García López">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="tel" class="form-input" id="colabTelefono" maxlength="20" placeholder="987654321">
          </div>
          <div class="form-group">
            <label class="form-label">Fecha de Ingreso <span class="required">*</span></label>
            <input type="date" class="form-input" id="colabFechaIngreso">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Pago por Viaje (S/)</label>
            <input type="number" class="form-input" id="colabPago" min="0" step="0.50" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Estado</label>
            <select class="form-input" id="colabEstado">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
              <option value="suspendido">Suspendido</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <textarea class="form-input form-textarea" id="colabDireccion" maxlength="300" placeholder="Av. Principal 123, Lima"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModalColaborador()">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveColaborador" onclick="saveColaborador()">
        <span>💾</span> Guardar
      </button>
    </div>
  </div>
</div>

<!-- Modal: Ver Historial -->
<div class="modal-overlay" id="modalHistorial">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon blue">📋</div>
        <span id="modalHistorialTitle">Historial de Viajes</span>
      </div>
      <button class="btn-modal-close" onclick="document.getElementById('modalHistorial').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body" id="modalHistorialBody">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById('app').innerHTML = `
  ${renderSidebar()}
  ${renderTopbar('Colaboradores', 'Gestión de personal — JOAQUIN D&M')}
  <main class="main-content" id="mainContent">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Colaboradores</h1>
        <div class="breadcrumb">
          <span>Inicio</span><span class="sep">›</span>
          <span>Colaboradores</span>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-secondary" onclick="exportColaboradores()">
          <span>📥</span> Exportar
        </button>
        <button class="btn btn-primary" data-role="supervisor" onclick="openModalColaborador()">
          <span>+</span> Nuevo Colaborador
        </button>
      </div>
    </div>

    <!-- Stats rápidas -->
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:24px" id="collabKpis">
    </div>

    <!-- Tabla -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="title-icon">👥</div>
          Lista de Colaboradores
        </div>
        <div class="search-bar">
          <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre, DNI, cargo...">
          </div>
          <select class="filter-select" id="filterEstado">
            <option value="">Todos los estados</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
            <option value="suspendido">Suspendido</option>
          </select>
          <select class="filter-select" id="filterCargo">
            <option value="">Todos los cargos</option>
          </select>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-wrapper" id="tablaColaboradores">
          <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando colaboradores...</p></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
`;
</script>
<script src="../js/colaboradores.js"></script>
</body>
</html>
