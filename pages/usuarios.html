<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — JOAQUIN D&M</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="app"></div>
<div class="session-bar"><div class="session-bar-fill" id="sessionBar"></div></div>
<div id="notificationContainer" class="notification-container"></div>

<!-- Modal: Usuario -->
<div class="modal-overlay" id="modalUsuario">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon blue">🔐</div>
        <span id="modalUsuarioTitle">Nuevo Usuario</span>
      </div>
      <button class="btn-modal-close" onclick="closeModalUsuario()">✕</button>
    </div>
    <div class="modal-body">
      <form id="formUsuario" novalidate>
        <input type="hidden" id="userId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Usuario <span class="required">*</span></label>
            <input type="text" class="form-input" id="userUsername" maxlength="50" placeholder="nombre.usuario" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">Rol <span class="required">*</span></label>
            <select class="form-input" id="userRol">
              <option value="consulta">Consulta</option>
              <option value="supervisor">Supervisor</option>
              <option value="administrador">Administrador</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nombre Completo <span class="required">*</span></label>
          <input type="text" class="form-input" id="userNombre" maxlength="100" placeholder="Juan García López">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="userEmail" maxlength="100" placeholder="usuario@joaquindm.com">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" id="labelPassword">Contraseña <span class="required">*</span></label>
            <div style="position:relative">
              <input type="password" class="form-input" id="userPassword" maxlength="100" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
              <button type="button" onclick="togglePassVis('userPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Estado</label>
            <select class="form-input" id="userActivo">
              <option value="true">Activo</option>
              <option value="false">Inactivo</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="passHelp" style="margin-top:-12px">
          <small style="color:var(--text-muted);font-size:.78rem">Mínimo 8 caracteres. Deja en blanco para mantener la contraseña actual (solo en edición)</small>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModalUsuario()">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveUsuario" onclick="saveUsuario()">
        <span>💾</span> Guardar
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById('app').innerHTML = `
  ${renderSidebar()}
  ${renderTopbar('Gestión de Usuarios', 'Control de acceso y roles del sistema')}
  <main class="main-content" id="mainContent">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Usuarios del Sistema</h1>
        <div class="breadcrumb">
          <span>Inicio</span><span class="sep">›</span><span>Usuarios</span>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openModalUsuario()"><span>+</span> Nuevo Usuario</button>
      </div>
    </div>

    <!-- Tabla de usuarios -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><div class="title-icon">🔐</div>Usuarios Registrados</div>
        <div class="search-input-wrapper" style="width:240px">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchUsuarios" placeholder="Buscar usuario...">
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-wrapper" id="tablaUsuarios">
          <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
        </div>
      </div>
    </div>

    <!-- Login Logs -->
    <div class="card" style="margin-top:24px">
      <div class="card-header">
        <div class="card-title"><div class="title-icon">📋</div>Registro de Accesos Recientes</div>
      </div>
      <div class="card-body p-0">
        <div class="table-wrapper" id="loginLogsTable">
          <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
        </div>
      </div>
    </div>
  </main>
`;
</script>
<script src="../js/usuarios.js"></script>
</body>
</html>
