<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos Realizados — JOAQUIN D&M</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="app"></div>
<div class="session-bar"><div class="session-bar-fill" id="sessionBar"></div></div>
<div id="notificationContainer" class="notification-container"></div>

<!-- ========== MODAL: Ver Pago Realizado ========== -->
<div class="modal-overlay" id="modalViewPagado"
     onclick="if(event.target===this)closeModalViewPagado()">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon green">👁</div>
        <span id="viewPagadoTitle">Detalle del Pago</span>
      </div>
      <button class="btn-modal-close" onclick="closeModalViewPagado()">✕</button>
    </div>
    <div class="modal-body" id="viewPagadoBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModalViewPagado()">Cerrar</button>
    </div>
  </div>
</div>

<!-- ========== MODAL: Editar Pago Realizado ========== -->
<div class="modal-overlay" id="modalEditPagado"
     onclick="if(event.target===this)closeModalEditPagado()">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-icon blue">✏</div>
        <span>Modificar Pago Realizado</span>
      </div>
      <button class="btn-modal-close" onclick="closeModalEditPagado()">✕</button>
    </div>
    <div class="modal-body">

      <!-- Información de solo lectura -->
      <div style="background:var(--light-bg);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:20px;border-left:4px solid var(--success)">
        <div style="font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">
          Información del Viaje (solo lectura)
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <div style="font-size:.78rem;color:var(--text-muted)">Colaborador</div>
            <div style="font-weight:700;color:var(--text-primary)" id="editPagColaborador">—</div>
          </div>
          <div>
            <div style="font-size:.78rem;color:var(--text-muted)">Ruta</div>
            <div style="font-weight:700;color:var(--text-primary)" id="editPagRuta">—</div>
          </div>
        </div>
      </div>

      <form id="formEditPagado" onsubmit="return false">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Pago (S/) <span class="required">*</span></label>
            <input type="number" class="form-input" id="editPagPago"
                   step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label class="form-label">Fecha del Pago</label>
            <input type="datetime-local" class="form-input" id="editPagFechaPago">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Horas Trabajadas</label>
            <input type="number" class="form-input" id="editPagHoras"
                   step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Usuario que Registró</label>
            <input type="text" class="form-input" id="editPagUsuario"
                   placeholder="Username del registrador">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Observaciones</label>
          <textarea class="form-input form-textarea" id="editPagObs"
                    rows="3" placeholder="Observaciones adicionales..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModalEditPagado()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmSaveEditPagado()">
        💾 Guardar Cambios
      </button>
    </div>
  </div>
</div>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<!-- jsPDF + autoTable -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById('app').innerHTML = `
  ${renderSidebar()}
  ${renderTopbar('Pagos Realizados', 'Historial de pagos registrados — JOAQUIN D&M')}
  <main class="main-content" id="mainContent">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Pagos Realizados</h1>
        <div class="breadcrumb">
          <span>Inicio</span><span class="sep">›</span><span>Pagos Realizados</span>
        </div>
      </div>
      <div class="page-header-actions">
        <a class="btn btn-secondary" href="pagos-pendientes.html">
          <span>⏳</span> Ver Pagos Pendientes
        </a>
        <button class="btn btn-primary" onclick="exportExcel()">
          <span>📥</span> Exportar Excel
        </button>
        <button class="btn btn-secondary" onclick="exportPDF()">
          <span>📄</span> Exportar PDF
        </button>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:24px" id="pagadosKpis">
      <div class="kpi-card green"><div class="skeleton" style="height:90px"></div></div>
      <div class="kpi-card teal"><div class="skeleton" style="height:90px"></div></div>
      <div class="kpi-card blue"><div class="skeleton" style="height:90px"></div></div>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="card-body" style="padding:16px 24px">
        <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
          <div style="display:flex;flex-direction:column;gap:6px">
            <label class="form-label">Período</label>
            <select class="filter-select" id="filtroPeriodo" style="min-width:150px">
              <option value="dia">Hoy</option>
              <option value="semana">Semana Actual</option>
              <option value="mes" selected>Mes Actual</option>
              <option value="anio">Año Actual</option>
              <option value="personalizado">Personalizado</option>
            </select>
          </div>
          <div id="fechasPersonalizadas" style="display:none;gap:12px;align-items:flex-end">
            <div style="display:flex;flex-direction:column;gap:6px">
              <label class="form-label">Desde</label>
              <input type="date" class="filter-select" id="fechaDesde">
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <label class="form-label">Hasta</label>
              <input type="date" class="filter-select" id="fechaHasta">
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <label class="form-label">Buscar</label>
            <div class="search-input-wrapper" style="width:220px">
              <span class="search-icon">🔍</span>
              <input type="text" class="search-input" id="buscarColaborador" placeholder="Nombre o DNI...">
            </div>
          </div>
          <button class="btn btn-primary" onclick="loadPagados()">
            <span>🔄</span> Aplicar Filtros
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><div class="title-icon">✅</div>Historial de Pagos Realizados</div>
        <div style="font-size:.8rem;color:var(--text-muted)" id="pagadosCount"></div>
      </div>
      <div class="card-body p-0">
        <div class="table-wrapper" id="tablaPagados">
          <div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
        </div>
      </div>
    </div>

  </main>
`;
</script>
<script src="../js/pagos-pagados.js"></script>
</body>
</html>
